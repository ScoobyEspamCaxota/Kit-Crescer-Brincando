[build]
  publish = "."
  functions = "netlify/functions"

[[redirects]]
  from = "/api/checkout"
  to = "/.netlify/functions/checkout"
  status = 200
  force = true

[[redirects]]
  from = "/api/status/:chargeId"
  to = "/.netlify/functions/status/:chargeId"
  status = 200
  force = true

[[redirects]]
  from = "/api/webhook"
  to = "/.netlify/functions/webhook"
  status = 200
  force = true

[[redirects]]
  from = "/api/health"
  to = "/.netlify/functions/health"
  status = 200
  force = true
